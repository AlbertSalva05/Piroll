<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Grid</title>
  <link rel="stylesheet" href="style.css" />
  <style>
 * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #f4f4f4;
  font-family: 'Inter', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.portfolio {
  width: 90%;
  max-width: 900px;
  padding: 40px 0;
}

.portfolio__grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-gap: 20px;
}

.portfolio__item {
  background: #fff;
  overflow: hidden;
  border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  display: flex;
  justify-content: center;
  align-items: center;
}

.portfolio__item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Different height proportions based on the reference image */
.portfolio__item {
  height: 230px; /* default small cards */
}

.portfolio__item.tall {
  height: 340px; /* taller cards like the bag and phone mockup */
}

/* Responsive behavior */
@media (max-width: 768px) {
  .portfolio__grid {
    grid-template-columns: 1fr;
  }
}

  </style>
</head>
<body>

</head>
<body>

  <section class="portfolio">

      </div>
      <div class="portfolio__item">

      </div>
      <div class="portfolio__item">
        <img src="https://dummyimage.com/600x400/000/fff" alt="Project 5">
      </div>
      <div class="portfolio__item">
        <img src="https://dummyimage.com/600x400/000/fff" alt="Project 6">
      </div>
    </div>
  </section>

</body>
</html>
