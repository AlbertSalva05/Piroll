<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two-Column Responsive Layout</title>
  <style>
    /* Product List */
.product-list {
  display: flex;
  gap: 20px;
}
.product-item {
  position: relative;
  width: 180px;
  cursor: pointer;
  text-align: center;
}
.product-item img {
  width: 100%;
  border-radius: 8px;
}
.product-item .overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: 0.3s ease;
  border-radius: 8px;
}
.product-item:hover .overlay {
  opacity: 1;
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}
.modal-content {
  background: #fff;
  padding: 20px;
  width: 700px;
  max-width: 90%;
  border-radius: 10px;
  animation: zoomUp 0.4s ease;
}
@keyframes zoomUp {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.modal-header h2 { margin: 0; }
.modal-body { margin: 15px 0; }
.modal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.slider img {
  width: 100%;
  border-radius: 6px;
  margin-bottom: 8px;
}
.modal-footer {
  text-align: right;
}

  </style>
</head>
<body>
  <div class="container">
    <div class="product-list">
  <div class="product-item" data-id="1">
    <div class="overlay">View Details</div>
    <img src="images/work_img_product_001.jpg" alt="Product 1">
    <h3>Product 1</h3>
  </div>

  <div class="product-item" data-id="2">
    <div class="overlay">View Details</div>
    <img src="images/work_img_product_002.jpg" alt="Product 2">
    <h3>Product 2</h3>
  </div>
</div>

<!-- Modal -->
<div id="productModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
    </div>
    <div class="modal-body">
      <p id="modalDesc"></p>
      <div class="modal-grid">
        <div class="modal-left">
          <div class="slider" id="modalSlider"></div>
        </div>
        <div class="modal-right" id="modalThumbDesc"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="closeModal">Close</button>
    </div>
  </div>
</div>

  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
// Sample JSON data
const products = [
  {
    id: 1,
    title: "Product 1",
    description: "This is the description for Product 1.",
    images: [
      "images/work_img_product_001.jpg",
      "images/work_img_product_002.jpg",
      "images/work_img_product_003.jpg"
    ],
    subcontent: "This is extra details for Product 1 displayed on the right."
  },
  {
    id: 2,
    title: "Product 2",
    description: "This is the description for Product 2.",
    images: [
      "images/work_img_product_001.jpg",
      "images/work_img_product_002.jpg",
      "images/work_img_product_003.jpg"
    ],
    subcontent: "This is extra details for Product 2 displayed on the right."
  }
];

$(document).ready(function(){

  // Click handler for product items
  $(".product-item").click(function(){
    const id = $(this).data("id");
    const product = products.find(p => p.id == id);

    if (product) {
      $("#modalTitle").text(product.title);
      $("#modalDesc").text(product.description);

      // Populate slider
      $("#modalSlider").empty();
      product.images.forEach(img => {
        $("#modalSlider").append(`<img src="${img}" alt="${product.title}">`);
      });

      // Populate subcontent
      $("#modalThumbDesc").text(product.subcontent);

      // Show modal
      $("#productModal").fadeIn();
    }
  });

  // Close modal
  $("#closeModal, #productModal").click(function(e){
    if(e.target.id === "closeModal" || e.target.id === "productModal") {
      $("#productModal").fadeOut();
    }
  });

});
</script>

</body>
</html>
